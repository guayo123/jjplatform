spring:
  application:
    name: jjplatform-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jjplatform}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 100
        order_inserts: true
        order_updates: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  mail:
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          # Fail fast instead of hanging the request thread if the SMTP relay is unreachable/slow
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

server:
  port: ${PORT:8080}
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: INFO
    com.jjplatform: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

app:
  jwt:
    # No default on purpose: if JWT_SECRET is missing in prod the app must
    # fail to start rather than run with a known, insecure placeholder key.
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  file:
    upload-dir: ${FILE_UPLOAD_DIR:/tmp/uploads}
  base-url: ${APP_BASE_URL:https://fantastic-success-production-b215.up.railway.app}
  cors:
    allowed-origins: ${CORS_ORIGINS:https://jjplatform.vercel.app}
  mail:
    # Brevo HTTP API key (v3). Used to send transactional email over HTTPS, since Railway blocks SMTP ports.
    brevo-api-key: ${BREVO_API_KEY:}
    from: ${MAIL_FROM:no-reply@jjplatform.app}
    from-name: ${MAIL_FROM_NAME:JJPlatform}
    login-url: ${MAIL_LOGIN_URL:https://jjplatform.vercel.app/login}
    # Where students click to sign in after self-registering (dedicated student portal login)
    student-login-url: ${MAIL_STUDENT_LOGIN_URL:https://jjplatform.vercel.app/portal/login}
