spring:
  application:
    name: jjplatform-api

  datasource:
    url: jdbc:postgresql://localhost:5432/jjplatform
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' permite que Hibernate cree y actualice las tablas automáticamente
      ddl-auto: update
    show-sql: true # Lo cambiamos a 'true' para ver las consultas SQL en la consola, muy útil para depurar
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  mail:
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          # Fail fast instead of hanging the request thread if the SMTP relay is unreachable/slow
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-min-32-chars!!}
    expiration-ms: 86400000  # 24 hours
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  base-url: ${APP_BASE_URL:http://localhost:8081}
  portal-url: ${PORTAL_URL:http://localhost:5173/portal}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
  groq:
    api-key: ${GROQ_API_KEY:}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}
  mail:
    # Brevo HTTP API key (v3). Used to send transactional email over HTTPS, since Railway blocks SMTP ports.
    brevo-api-key: ${BREVO_API_KEY:}
    from: ${MAIL_FROM:no-reply@jjplatform.local}
    from-name: ${MAIL_FROM_NAME:JJPlatform}
    # Frontend URL embedded in invitation emails so the user can click straight to login
    login-url: ${MAIL_LOGIN_URL:http://localhost:5173/login}
    # Where students click to sign in after self-registering (dedicated student portal login)
    student-login-url: ${MAIL_STUDENT_LOGIN_URL:http://localhost:5173/portal/login}